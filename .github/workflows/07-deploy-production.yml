name: 07 - Deploy to Production

# Manual trigger only - requires explicit confirmation
on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: 'Type DEPLOY TO PRODUCTION to confirm'
        required: true
        type: string

permissions:
  contents: write

jobs:
  deploy-production:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Validate deployment confirmation
      - name: Validate deployment confirmation
        run: |
          if [ "${{ github.event.inputs.confirmation }}" != "DEPLOY TO PRODUCTION" ]; then
            echo "❌ Invalid confirmation. Please type 'DEPLOY TO PRODUCTION' exactly."
            exit 1
          fi
          echo "✅ Production deployment confirmed"

      # Step 2: Checkout staging branch
      - name: Checkout staging branch
        uses: actions/checkout@v4
        with:
          ref: staging
          fetch-depth: 0

      # Step 3: Configure Git
      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # Step 4: Merge staging to main (production)
      - name: Merge staging to main
        run: |
          git fetch origin
          git checkout main 2>/dev/null || git checkout -b main
          git merge origin/staging --no-ff -m "Production deployment: staging → main"
          git push origin main

      # Step 5: Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      # Step 6: Install dependencies
      - name: Install dependencies
        run: npm install
      
      # Step 7: Deploy to Vercel Production
      - name: Deploy to Vercel Production
        id: deploy
        run: |
          npx vercel --prod \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.PROD_VERCEL_PROJECT_ID }}
      
      # Step 8: Rollback on failure (optional)
      - name: Rollback on failure
        if: failure()
        run: |
          echo "❌ Production deployment failed"
          echo "🔄 Use Vercel dashboard to rollback"
          echo "Please check logs and contact DevOps team"
      
      # Step 9: Success notification
      # Step 9: Success notification
      - name: Notify successful deployment
        if: success()
        run: |
          echo "✅ Production deployment completed successfully"
          echo "🚀 Deployed to Vercel Production environment"
          echo ""
          echo "📊 Deployment Summary:"
          echo "  Environment: Production (main branch)"
          echo "  Status: Live"
          echo "  Deployed from: staging branch"
          echo ""
          echo "🎉 CI/CD Pipeline Complete!"

name: 03 - Auto Promote to Testing

# Trigger after Workflow 02 completes successfully
on:
  workflow_run:
    workflows: ["02 - Deploy to Development"]
    types:
      - completed

permissions:
  contents: write

jobs:
  promote-to-testing:
    # Only run if the triggering workflow succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout code
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: development
          fetch-depth: 0

      # Step 2: Configure Git
      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # Step 3: Fetch and ensure testing branch exists
      - name: Ensure testing branch exists
        run: |
          git fetch origin
          git checkout testing 2>/dev/null || git checkout -b testing
          git push -u origin testing || true

      # Step 4: Merge development to testing
      - name: Merge development to testing
        run: |
          git checkout testing
          git merge origin/development --no-ff -m "Auto-promote: development → testing [skip ci]"
          git push origin testing

      # Step 5: Notify promotion
      - name: Notify promotion
        run: |
          echo "✅ Successfully promoted development → testing"
          echo "🚀 Workflow 04 will trigger automatically"

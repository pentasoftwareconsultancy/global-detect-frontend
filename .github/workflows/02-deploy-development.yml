name: 02 - Deploy to Development

# Manual trigger only - Team Leader must approve deployment
on:
  workflow_dispatch:
    inputs:
      approval:
        description: 'Type DEPLOY to deploy to development'
        required: true
        type: string

jobs:
  deploy-development:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Validate deployment approval
      - name: Validate approval
        run: |
          if [ "${{ github.event.inputs.approval }}" != "DEPLOY" ]; then
            echo "❌ Invalid approval input. Please type DEPLOY exactly."
            exit 1
          fi
          echo "✅ Team Leader approved deployment to development"

      # Step 2: Checkout development branch explicitly
      - name: Checkout development branch
        uses: actions/checkout@v4
        with:
          ref: development
          fetch-depth: 0

      # Step 3: Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # Step 4: Install frontend dependencies
      - name: Install frontend dependencies
        run: npm install

      # Step 5: Run frontend tests
      - name: Run frontend tests
        run: npm test -- --watchAll=false

      # Step 6: Deploy to Vercel (Development)
      - name: Deploy to Vercel Development
        run: |
          npm install -g vercel
          vercel pull --yes --environment=development --token=${{ secrets.VERCEL_TOKEN }}
          vercel build --token=${{ secrets.VERCEL_TOKEN }}
          vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_DEV }}

      # Step 7: Deployment summary
      - name: Deployment summary
        run: |
          echo "✅ Development deployment completed successfully"
          echo "Frontend: Deployed to Vercel (Development environment)"
          echo "🚀 Workflow 03 will trigger automatically"

name: 02 - Deploy to Development

# Manual trigger only - Team Leader must approve deployment
on:
  workflow_dispatch:
    inputs:
      approval:
        description: 'Type DEPLOY to deploy to development'
        required: true
        type: string

jobs:
  deploy-development:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Validate deployment approval
      - name: Validate approval
        run: |
          if [ "${{ github.event.inputs.approval }}" != "DEPLOY" ]; then
            echo "❌ Invalid approval input. Please type DEPLOY exactly."
            exit 1
          fi
          echo "✅ Team Leader approved deployment to development"

      # Step 2: Checkout development branch explicitly
      - name: Checkout development branch
        uses: actions/checkout@v4
        with:
          ref: development
          fetch-depth: 0

      # Step 3: Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Step 4: Install dependencies
      - name: Install dependencies
        run: npm install

      # Step 5: Deploy to Vercel Development
      - name: Deploy to Vercel Development
        run: |
          npx vercel --prod \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.DEV_VERCEL_PROJECT_ID }}

      # Step 6: Deployment summary
      - name: Deployment summary
        run: |
          echo "✅ Development deployment completed successfully"
          echo "🚀 Deployed to Vercel Development environment"
          echo "🚀 Workflow 03 will trigger automatically"

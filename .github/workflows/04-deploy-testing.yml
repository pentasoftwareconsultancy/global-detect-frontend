name: 04 - Deploy to Testing

# Trigger after Workflow 03 completes successfully
on:
  workflow_run:
    workflows: ["03 - Auto Promote to Testing"]
    types:
      - completed

jobs:
  deploy-testing:
    # Only run if the triggering workflow succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout testing branch
      - name: Checkout testing branch
        uses: actions/checkout@v4
        with:
          ref: testing
          fetch-depth: 0

      # Step 2: Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # Step 3: Install dependencies
      - name: Install dependencies
        run: npm install

      # Step 4: Deploy to Vercel (Testing)
      - name: Deploy to Vercel Testing
        run: |
          npx vercel --prod --token=${{ secrets.VERCEL_TOKEN }} --scope=${{ secrets.VERCEL_ORG_ID }} --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_TEST }}

      # Step 5: Notify QA team
      - name: Notify QA team
        run: |
          echo "📧 Notifying QA team"
          echo "Testing environment is ready for QA validation"
          echo ""
          echo "Testing URL: Check Vercel dashboard"
          echo ""
          echo "⏸️  Pipeline paused - waiting for QA approval"
          echo "To approve for staging, run workflow: 05-qa-approval.yml with input 'APPROVE'"

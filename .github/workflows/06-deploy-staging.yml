name: 06 - Deploy to Staging

# Trigger after QA approval (Workflow 05) completes successfully
on:
  workflow_run:
    workflows: ["05 - QA Approval"]
    types:
      - completed

jobs:
  deploy-staging:
    # Only run if the triggering workflow succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout staging branch
      - name: Checkout staging branch
        uses: actions/checkout@v4
        with:
          ref: staging
          fetch-depth: 0

      # Step 2: Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # Step 3: Install frontend dependencies
      - name: Install frontend dependencies
        run: npm install

      # Step 4: Run frontend tests
      - name: Run frontend tests
        run: npm test -- --watchAll=false

      # Step 5: Deploy to Vercel (Staging)
      - name: Deploy to Vercel Staging
        run: |
          npm install -g vercel
          vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
          vercel build --token=${{ secrets.VERCEL_TOKEN }}
          vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_STAGING }}

      # Step 6: Notify business team
      - name: Notify business team
        run: |
          echo "📧 Notifying business stakeholders"
          echo "Staging environment is ready for final review"
          echo ""
          echo "Staging URL: Check Vercel dashboard for deployment URL"
          echo ""
          echo "⏸️  Pipeline paused - waiting for production approval"
          echo "To deploy to production, run workflow: 07-deploy-production.yml with input 'DEPLOY TO PRODUCTION'"

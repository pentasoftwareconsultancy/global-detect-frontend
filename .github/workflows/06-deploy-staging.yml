name: 06 - Deploy to Staging

# Trigger after QA approval (Workflow 05) completes successfully
on:
  workflow_run:
    workflows: ["05 - QA Approval"]
    types:
      - completed

jobs:
  deploy-staging:
    # Only run if the triggering workflow succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout staging branch
      - name: Checkout staging branch
        uses: actions/checkout@v4
        with:
          ref: staging
          fetch-depth: 0

      # Step 2: Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      # Step 3: Install frontend dependencies
      - name: Install frontend dependencies
        run: npm install

      # Step 4: Run frontend tests
      - name: Run frontend tests
        run: npm test -- --watchAll=false

      # Step 5: Login to Container Registry
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Step 6: Build and push Docker image
      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          build-args: |
            REACT_APP_API_URL=${{ secrets.STAGING_API_URL }}
          tags: |
            ghcr.io/${{ github.repository }}:staging
            ghcr.io/${{ github.repository }}:staging-${{ github.sha }}

      # Step 7: Deploy to staging server
      - name: Deploy to Staging Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.STAGING_SERVER_HOST }}
          username: ${{ secrets.STAGING_SERVER_USER }}
          key: ${{ secrets.STAGING_SERVER_SSH_KEY }}
          script: |
            docker pull ghcr.io/${{ github.repository }}:staging
            docker stop frontend-staging || true
            docker rm frontend-staging || true
            docker run -d \
              --name frontend-staging \
              -p 3000:80 \
              --restart unless-stopped \
              ghcr.io/${{ github.repository }}:staging

      # Step 8: Notify business team
      - name: Notify business team
        run: |
          echo "📧 Notifying business stakeholders"
          echo "Staging environment is ready for final review"
          echo ""
          echo "Staging URL: ${{ secrets.STAGING_FRONTEND_URL }}"
          echo "Docker Image: ghcr.io/${{ github.repository }}:staging"
          echo ""
          echo "⏸️  Pipeline paused - waiting for production approval"
          echo "To deploy to production, run workflow: 07-deploy-production.yml with input 'DEPLOY TO PRODUCTION'"
